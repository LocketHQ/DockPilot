name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── 1. Linux runner binaries (musl, static) ───────────────────────────────
  build-runner:
    name: runner-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
          - arch: aarch64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: runner-${{ matrix.arch }}

      - name: Install musl + cross-compile tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          fi

      - name: Build runner
        run: cargo build -p lockethq-runner --release --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/lockethq-runner \
             out/lockethq-runner-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.arch }}
          path: out/lockethq-runner-${{ matrix.arch }}
          if-no-files-found: error

  # ─── 2. Desktop bundles (macOS DMG + Windows MSI) ──────────────────────────
  build-desktop:
    name: desktop-${{ matrix.os }}
    needs: build-runner
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
            artifacts: |
              app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              app/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          - os: windows-latest
            target: ''
            artifacts: |
              app/src-tauri/target/release/bundle/msi/*.msi
              app/src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets (universal build needs both)
        if: matrix.os == 'macos-14'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.os }}
          workspaces: app/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Download runner binaries
        uses: actions/download-artifact@v4
        with:
          pattern: runner-*
          merge-multiple: true
          path: app/src-tauri/binaries

      - name: Make runner binaries executable (macOS)
        if: matrix.os == 'macos-14'
        run: chmod +x app/src-tauri/binaries/*

      - name: List bundled runner binaries
        shell: bash
        run: ls -la app/src-tauri/binaries

      - name: Build Tauri app (macOS universal, unsigned)
        if: matrix.os == 'macos-14'
        working-directory: app
        env:
          # Skip signing & notarization — we ship unsigned for now.
          APPLE_SIGNING_IDENTITY: ''
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: app
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  # ─── 3. Publish to GitHub Releases (only on tag) ──────────────────────────
  release:
    name: publish release
    needs: [build-runner, build-desktop]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
