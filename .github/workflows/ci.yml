name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Build runner binary
        # The app's tauri.conf.json bundles `binaries/*` as resources, but those
        # runner binaries are gitignored build artifacts only produced at release
        # time. Without them the tauri build script fails with "glob pattern
        # binaries/* ... didn't match any files". Build the real runner and stage
        # it where the app expects it; this also verifies the runner compiles.
        run: |
          cargo build -p lockethq-runner
          mkdir -p app/src-tauri/binaries
          cp target/debug/lockethq-runner app/src-tauri/binaries/lockethq-runner-x86_64
      - name: cargo check
        run: cargo check --workspace --all-targets

  typescript:
    name: tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: app
        run: pnpm exec tsc --noEmit
